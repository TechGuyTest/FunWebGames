<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Star Catcher - FunWebGames</title>
  <link rel="stylesheet" href="../../css/shared.css">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="../../css/accessibility.css">
  <meta name="description" content="Catch falling stars with your basket! - Keyboard accessible">
</head>
<body>
  <!-- Skip Link for Accessibility -->
  <a href="#game-canvas" class="skip-link">Skip to game</a>
  
  <a href="../../index.html" class="btn btn-back">← Back to Games</a>

  <main class="game-container" role="main">
    <div class="game-area">
      <button class="help-btn" id="help-btn" aria-label="Show help" title="Help" style="position: absolute; top: var(--spacing-md); right: var(--spacing-md); z-index: 100;">❓</button>
      <canvas id="game-canvas"></canvas>
      
      <div class="score-display" id="score-display">
        <!-- Star icons will be added here dynamically -->
      </div>
      
      <div class="timer-display" id="timer-display">60s</div>
      <div class="counter-display" id="counter-display">0/20</div>
    </div>
    
    <div class="controls">
      <button class="arrow-btn left" data-direction="left" aria-label="Move basket left">←</button>
      <button class="arrow-btn right" data-direction="right" aria-label="Move basket right">→</button>
    </div>

    <!-- Game Over Screen -->
    <div class="game-over hidden" id="game-over-screen">
      <div class="game-over-content">
        <h2>Game Over! 🌟</h2>
        <div class="final-score" id="final-score">
          <!-- Final score stars will be displayed here -->
        </div>
        <div class="best-score" id="best-score-display"></div>
        <div class="buttons">
          <button class="btn btn-primary play-again-btn" id="play-again-btn">🎮 Play Again</button>
          <button class="btn btn-secondary back-to-games-btn" id="back-to-games-btn">← Back to Games</button>
        </div>
      </div>
    </div>
  </main>

  <script src="../../js/highscore.js"></script>
  <script src="../../js/help-modal.js"></script>
  <script src="../../js/sound-toggle.js"></script>
  <script src="../../js/keyboard-nav.js"></script>
  <script src="script.js"></script>
</body>
</html>
