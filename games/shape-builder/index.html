<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shape Builder - FunWebGames</title>
  <link rel="stylesheet" href="../../css/shared.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Skip Link for Accessibility -->
  <a href="#game-canvas" class="skip-link">Skip to canvas</a>
  
  <a href="../../index.html" class="btn btn-back">← Back to Games</a>
  
  <main class="game-container" role="main">
    <header class="game-header">
      <h1>🔷 Shape Builder</h1>
      <div class="level-info">
        <span id="level-display">Level 1/10</span>
      </div>
    </header>

    <div class="game-area">
      <!-- Left: Shape Palette -->
      <aside class="shape-palette" id="palette">
        <h2>Shapes</h2>
        <div class="palette-grid">
          <!-- Shapes will be generated by JS -->
        </div>
        <div class="palette-controls">
          <button id="btn-restart" class="btn btn-secondary">🔄 Restart</button>
          <button id="btn-hint" class="btn btn-primary">💡 Show Hint</button>
        </div>
      </aside>

      <!-- Right: Canvas Area -->
      <section class="canvas-area">
        <div class="target-container">
          <h2>Build This:</h2>
          <div id="target-display" class="target-display">
            <!-- Target silhouette shown here -->
          </div>
        </div>
        
        <div class="canvas-container">
          <div id="game-canvas" class="game-canvas">
            <!-- Dropped shapes appear here -->
          </div>
          <div id="trash-zone" class="trash-zone">
            🗑️ Drop here to delete
          </div>
        </div>
      </section>
    </div>

    <!-- Completion Modal -->
    <div id="completion-modal" class="modal hidden">
      <div class="modal-content">
        <h2>🎉 You did it!</h2>
        <p>Great job building the shape!</p>
        <p class="celebration__stats" id="moves-display"></p>
        <p class="celebration__best" id="best-moves-display"></p>
        <button id="btn-next" class="btn btn-primary btn-lg">Next Picture →</button>
      </div>
    </div>
  </main>

  <!-- Audio Elements -->
  <audio id="sound-lift" preload="auto"></audio>
  <audio id="sound-chime" preload="auto"></audio>
  <audio id="sound-boop" preload="auto"></audio>
  <audio id="sound-celebration" preload="auto"></audio>

  <script src="../../js/highscore.js"></script>
  <script src="script.js"></script>
</body>
</html>
