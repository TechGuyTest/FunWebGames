<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Color Match Memory - FunWebGames</title>
  <link rel="stylesheet" href="../../css/shared.css">
</head>
<body>
  <!-- Back to Games Button (GR-1: Landing Page) -->
  <a href="../../index.html" class="btn btn-back">← Back to Games</a>

  <!-- Game Container -->
  <main class="game-container">
    <div class="game-area">
      <h1 class="text-center">🎨 Color Match Memory</h1>
      <p class="text-center mt-md">Game coming soon!</p>
      <p class="text-center mt-sm">Find matching pairs of colored shapes.</p>
    </div>
  </main>

  <script>
    // Soft "pop" sound on page load (GR-3: Audio & Feedback)
    try {
      const audioContext = new (window.AudioContext || window.webkitAudioContext)();
      const oscillator = audioContext.createOscillator();
      const gainNode = audioContext.createGain();
      
      oscillator.connect(gainNode);
      gainNode.connect(audioContext.destination);
      
      oscillator.frequency.value = 800;
      oscillator.type = 'sine';
      
      gainNode.gain.setValueAtTime(0.2, audioContext.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
      
      oscillator.start(audioContext.currentTime);
      oscillator.stop(audioContext.currentTime + 0.3);
    } catch (err) {
      // Audio not supported
    }
  </script>
</body>
</html>
