<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Color Match Memory - FunWebGames</title>
  <link rel="stylesheet" href="../../css/shared.css">
  <link rel="stylesheet" href="style.css">
  <meta name="description" content="Classic memory card-flip game with colored shapes">
</head>
<body>
  <!-- Skip Link for Accessibility -->
  <a href="#game-grid" class="skip-link">Skip to game</a>
  
  <!-- Back to Games Button -->
  <a href="../../index.html" class="btn btn-back">← Back to Games</a>

  <!-- Game Container -->
  <main class="game-container" role="main">
    <!-- Game Header -->
    <header class="game-header">
      <h1>🎨 Color Match Memory</h1>
      
      <!-- Difficulty Selector -->
      <div class="difficulty-selector">
        <span class="difficulty-label">Difficulty:</span>
        <button class="difficulty-btn" data-level="easy" aria-label="Easy difficulty">★</button>
        <button class="difficulty-btn" data-level="medium" aria-label="Medium difficulty">★★</button>
        <button class="difficulty-btn" data-level="hard" aria-label="Hard difficulty">★★★</button>
      </div>

      <!-- Stats Bar -->
      <div class="stats-bar">
        <div class="stat">
          <span class="stat-label">⏱️ Time:</span>
          <span id="timer" class="stat-value">0s</span>
        </div>
        <div class="stat">
          <span class="stat-label">🎯 Moves:</span>
          <span id="moves" class="stat-value">0</span>
        </div>
        <button id="restart-btn" class="btn btn-secondary">🔄 Restart</button>
      </div>
    </header>

    <!-- Game Area -->
    <div class="game-area">
      <div id="game-grid" class="game-grid">
        <!-- Cards will be generated by JavaScript -->
      </div>
    </div>

    <!-- Celebration Modal -->
    <div id="celebration-modal" class="modal hidden">
      <div class="modal-content">
        <div class="celebration">
          <h2 class="celebration__title">🎉 You Won! 🎉</h2>
          <p class="celebration__message">
            Time: <span id="final-time"></span><br>
            Moves: <span id="final-moves"></span>
          </p>
          <p class="celebration__best" id="best-moves-display"></p>
          <button id="play-again-btn" class="btn btn-primary">🎮 Play Again</button>
        </div>
      </div>
    </div>
  </main>

  <script src="../../js/highscore.js"></script>
  <script src="script.js"></script>
</body>
</html>
