<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animal Puzzle - FunWebGames</title>
  <link rel="stylesheet" href="../../css/shared.css">
  <link rel="stylesheet" href="style.css">
  <meta name="description" content="Drag-and-drop jigsaw puzzle with cute animal pictures">
</head>
<body>
  <!-- Skip Link for Accessibility -->
  <a href="#puzzle-board" class="skip-link">Skip to puzzle</a>
  
  <a href="../../index.html" class="btn btn-back">← Back to Games</a>

  <main class="game-container" role="main">
    <header class="game-header">
      <h1>🧩 Animal Puzzle</h1>
      <button class="help-btn" id="help-btn" aria-label="Show help" title="Help">❓</button>
      
      <div class="difficulty-selector">
        <span class="difficulty-label">Difficulty:</span>
        <button class="difficulty-btn" data-level="easy" aria-label="Easy difficulty">★</button>
        <button class="difficulty-btn" data-level="medium" aria-label="Medium difficulty">★★</button>
        <button class="difficulty-btn" data-level="hard" aria-label="Hard difficulty">★★★</button>
      </div>

      <div class="stats-bar">
        <div class="stat">
          <span class="stat-label">🐾 Progress:</span>
          <span id="progress" class="stat-value">0/6</span>
        </div>
        <div class="stat">
          <span class="stat-label">⏱️ Time:</span>
          <span id="timer" class="stat-value">0s</span>
        </div>
        <div class="stat">
          <span class="stat-label">🐘 Animal:</span>
          <span id="animal-name" class="stat-value">Cat</span>
        </div>
        <button id="restart-btn" class="btn btn-secondary">🔄 Restart</button>
      </div>
    </header>

    <div class="game-area">
      <div class="puzzle-container">
        <div id="puzzle-board" class="puzzle-board">
          <!-- Ghost outlines and pieces will be generated by JavaScript -->
        </div>
        <div id="piece-pool" class="piece-pool">
          <!-- Scattered puzzle pieces will appear here -->
        </div>
      </div>
    </div>

    <div id="celebration-modal" class="modal hidden">
      <div class="modal-content">
        <div class="celebration">
          <h2 class="celebration__title">🎉 Puzzle Complete! 🎉</h2>
          <p class="celebration__message">You assembled the <span id="final-animal"></span>!</p>
          <p class="celebration__stats" id="final-time-display"></p>
          <p class="celebration__best" id="best-time-display"></p>
          <button id="play-again-btn" class="btn btn-primary">🎮 Play Again</button>
        </div>
      </div>
    </div>
  </main>

  <script src="../../js/highscore.js"></script>
  <script src="../../js/help-modal.js"></script>
  <script src="script.js"></script>
</body>
</html>
