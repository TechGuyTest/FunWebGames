<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bubble Pop - FunWebGames</title>
  <link rel="stylesheet" href="../../css/shared.css">
  <link rel="stylesheet" href="style.css">
  <meta name="description" content="Pop bubbles with numbers, letters, and colors">
</head>
<body>
  <!-- Skip Link for Accessibility -->
  <a href="#bubble-container" class="skip-link">Skip to bubbles</a>
  
  <a href="../../index.html" class="btn btn-back">← Back to Games</a>

  <main class="game-container" role="main">
    <header class="game-header">
      <h1>🫧 Bubble Pop</h1>
      <button class="help-btn" id="help-btn" aria-label="Show help" title="Help">❓</button>
      
      <div id="mode-selector" class="mode-selector">
        <span class="mode-label">Choose Mode:</span>
        <button class="mode-btn" data-mode="numbers" aria-label="Numbers mode">123 Numbers</button>
        <button class="mode-btn" data-mode="letters" aria-label="Letters mode">ABC Letters</button>
        <button class="mode-btn" data-mode="colors" aria-label="Colors mode">🎨 Colors</button>
      </div>

      <div id="game-ui" class="game-ui hidden">
        <div class="prompt-display">
          <span id="prompt-text" class="prompt-text">Pop the number 5!</span>
        </div>
        
        <div class="stats-bar">
          <div class="stat">
            <span class="stat-label">⭐ Score:</span>
            <div id="score-stars" class="score-stars"></div>
          </div>
          <div class="stat">
            <span class="stat-label">🎯 Round:</span>
            <span id="round-display" class="stat-value">1/10</span>
          </div>
          <button id="restart-btn" class="btn btn-secondary">🔄 Restart</button>
        </div>
      </div>
    </header>

    <div class="game-area">
      <div id="bubble-container" class="bubble-container">
        <!-- Bubbles will be spawned here -->
      </div>
    </div>

    <div id="celebration-modal" class="modal hidden">
      <div class="modal-content">
        <div class="celebration">
          <h2 class="celebration__title">🎉 You Did It! 🎉</h2>
          <p class="celebration__message">
            You popped <span id="final-score"></span> bubbles!
          </p>
          <p class="celebration__best" id="best-score-display"></p>
          <button id="play-again-btn" class="btn btn-primary">🎮 Play Again</button>
        </div>
      </div>
    </div>
  </main>

  <script src="../../js/highscore.js"></script>
  <script src="../../js/help-modal.js"></script>
  <script src="script.js"></script>
</body>
</html>
