<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Letter Explorer - FunWebGames</title>
  <link rel="stylesheet" href="../../css/shared.css">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="accessibility.css">
  <meta name="description" content="Learn letters A-Z with fun animations and tracing">
</head>
<body>
  <!-- Skip Link for Accessibility -->
  <a href="#letter-display" class="skip-link">Skip to letter</a>
  
  <a href="../../index.html" class="btn btn-back">← Back to Games</a>

  <main class="game-container" role="main">
    <div class="letter-explorer-container">
      <!-- Letter Display Area (top 40%) -->
      <div class="letter-display" id="letter-display">
        <div class="letter-large" id="letter-large">A</div>
        <div class="illustration" id="illustration">🍎</div>
        <div class="letter-text" id="letter-text">A is for Apple</div>
      </div>

      <!-- Tracing Canvas Area (middle 40%) -->
      <div class="tracing-area" id="tracing-area">
        <canvas id="tracing-canvas"></canvas>
        <div class="tracing-feedback" id="tracing-feedback"></div>
      </div>

      <!-- Controls (bottom 20%) -->
      <div class="controls">
        <button class="help-btn" id="help-btn" aria-label="Show help" title="Help" style="position: absolute; top: var(--spacing-md); right: var(--spacing-md);">❓</button>
        <button class="nav-button prev" id="prev-btn" aria-label="Previous letter">←</button>
        <div class="letter-carousel" id="letter-carousel">
          <!-- Letter buttons will be generated by JS -->
        </div>
        <button class="nav-button next" id="next-btn" aria-label="Next letter">→</button>
      </div>

      <!-- Mode Toggle -->
      <div class="mode-toggle" id="mode-toggle">
        <button class="mode-btn active" data-mode="name">Name</button>
        <button class="mode-btn" data-mode="sound">Sound</button>
        <button class="mode-btn" data-mode="trace">Trace</button>
      </div>

      <!-- Try Again Button (shown in trace mode) -->
      <button class="btn btn-secondary hidden" id="try-again-btn">🔄 Try Again</button>

      <!-- Tracing Accuracy Display -->
      <div class="accuracy-display hidden" id="accuracy-display">
        Accuracy: <span id="accuracy-value">0</span>%
      </div>

      <!-- Celebration Message -->
      <div class="celebration-message hidden" id="celebration-message">
        🎉 Great job! 🎉
      </div>
    </div>
  </main>

  <script src="../../js/highscore.js"></script>
  <script src="../../js/help-modal.js"></script>
  <script src="../../js/sound-toggle.js"></script>
  <script src="script.js"></script>
  <script src="keyboard-nav.js"></script>
</body>
</html>
