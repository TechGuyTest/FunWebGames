<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Counting Garden - FunWebGames</title>
  <link rel="stylesheet" href="../../css/shared.css">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="../../css/accessibility.css">
</head>
<body>
  <!-- Skip Link for Accessibility -->
  <a href="#garden" class="skip-link">Skip to garden</a>
  
  <a href="../../index.html" class="btn btn-back">← Back to Games</a>
  
  <main class="game-container" role="main">
    <header class="game-header">
      <h1>🌸 Counting Garden</h1>
      <button class="help-btn" id="help-btn" aria-label="Show help" title="Help">❓</button>
      <div class="score-display">
        <span id="stars">⭐ 0</span>
        <span id="round-display">Round 1/10</span>
      </div>
    </header>

    <div class="game-area">
      <!-- Garden Scene -->
      <section class="garden-scene" id="garden">
        <div class="sky"></div>
        <div class="grass"></div>
        <div class="objects-container" id="objects-container">
          <!-- Objects injected by JS -->
        </div>
      </section>

      <!-- Question & Answers -->
      <section class="question-area">
        <div class="prompt">
          <h2 id="question-text">How many butterflies?</h2>
        </div>
        
        <div class="options-container" id="options-container">
          <!-- Number buttons injected by JS -->
        </div>
        
        <div id="feedback-message" class="feedback-message"></div>
      </section>
    </div>

    <!-- Completion Modal -->
    <div id="completion-modal" class="modal hidden">
      <div class="modal-content">
        <h2>🎉 Amazing!</h2>
        <p>You collected <span id="final-stars">0</span> stars!</p>
        <p class="celebration__best" id="best-stars-display"></p>
        <button id="btn-play-again" class="btn btn-primary btn-lg">🔄 Play Again</button>
      </div>
    </div>
  </main>

  <audio id="sound-correct" preload="auto"></audio>
  <audio id="sound-count" preload="auto"></audio>
  <audio id="sound-wrong" preload="auto"></audio>
  <audio id="sound-round" preload="auto"></audio>
  <audio id="sound-celebration" preload="auto"></audio>

  <script src="../../js/highscore.js"></script>
  <script src="../../js/help-modal.js"></script>
  <script src="../../js/sound-toggle.js"></script>
  <script src="../../js/keyboard-nav.js"></script>
  <script src="script.js"></script>
</body>
</html>
